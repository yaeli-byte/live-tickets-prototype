   ============================================================ */
:root{ --slate:#27324a; --pgreen:#1c7a46; --pgreenbg:#eafaf0; --amber:#b8791b; }
.pur-head{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border-bottom:1px solid var(--line);position:relative;z-index:2;}
.pur-head .circle-btn{flex-shrink:0;}
.pur-head .nav-logo{height:20px;display:block;}
.pur-head .pur-title{margin-inline-start:auto;font-size:14px;font-weight:700;color:var(--ink);}
/* in-page timer bar (order/checkout) */
.obar2{display:flex;align-items:center;gap:9px;padding:9px 14px;font-size:12px;font-weight:600;color:#fff;}
.obar2.hold{background:var(--slate);}.obar2.warn{background:var(--amber);}.obar2.exp{background:#8a2b2b;}
.obar2 .clk{background:rgba(255,255,255,.2);border-radius:6px;padding:2px 8px;font-weight:700;font-variant-numeric:tabular-nums;}
/* sitewide active-order bar (fixed to bottom of the frame) */
.aob{position:fixed;bottom:0;left:0;right:0;max-width:375px;margin-inline:auto;z-index:70;display:flex;align-items:center;gap:9px;padding:12px 16px;font-size:12.5px;font-weight:600;color:#fff;cursor:pointer;box-shadow:0 -4px 16px rgba(0,0,0,.18);}
.aob.hold{background:var(--slate);}.aob.warn{background:var(--amber);}.aob.exp{background:#8a2b2b;}
.aob .aob-clk{background:rgba(255,255,255,.2);border-radius:6px;padding:2px 8px;font-weight:700;font-variant-numeric:tabular-nums;}
.aob .aob-go{margin-inline-start:auto;text-decoration:underline;}
/* content */
.pur{padding:14px 16px 26px;}
.pur.pur-pad{padding-bottom:100px;}
.pur.ctr-col{display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:44px;gap:5px;}
.pur-ev{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;}
.pur-ev-img{width:52px;height:52px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--card-dark);}
.pur-ev-i{flex:1;text-align:right;min-width:0;}
.pur-ev-t{font-size:14px;font-weight:700;color:var(--ink);}
.pur-ev-s{font-size:11px;color:var(--muted);margin-top:2px;}
.pur-lbl{font-size:12px;font-weight:700;color:var(--ink);text-align:right;margin:14px 0 6px;}
.pur-lbl.big{font-size:19px;margin-top:8px;}
.pur-sub{font-size:12px;color:var(--muted);text-align:right;}
.stepper2{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line);border-radius:999px;padding:5px 12px;background:#fff;}
.stepper2.sm{width:120px;padding:3px 8px;}
.stepper2 .stp{width:26px;height:26px;border-radius:50%;background:var(--orange);color:#fff;border:none;font-size:18px;font-weight:700;line-height:1;cursor:pointer;flex-shrink:0;}
.stepper2 .stp-n{font-size:13px;font-weight:600;color:var(--ink);}
.pur-card{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px;margin-top:8px;}
.pur-card.on{border-color:var(--pink);}
.pur-card.col{flex-direction:column;align-items:flex-end;gap:3px;text-align:right;}
.pur-card .pc-g{flex:1;text-align:right;min-width:0;}
.pur-card .pc-t{font-size:13px;font-weight:600;color:var(--ink);}
.pur-card .pc-s{font-size:11px;color:var(--muted);margin-top:2px;}
.badge-ok{background:var(--pgreenbg);color:var(--pgreen);border:1px solid #bfe8cf;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:600;flex-shrink:0;}
.addon-btn{background:none;border:1px solid var(--slate);color:var(--slate);border-radius:999px;padding:5px 14px;font:600 12px 'Rubik',sans-serif;cursor:pointer;flex-shrink:0;}
.addon-btn.on{background:var(--pgreenbg);border-color:var(--pgreen);color:var(--pgreen);}
.sumbox2{background:#faf7f2;border:1px solid var(--line);border-radius:11px;padding:11px;margin-top:12px;}
.sumbox2 .sr{display:flex;justify-content:space-between;font-size:12px;color:#4a5262;margin:3px 0;}
.sumbox2 .sr .incl{color:var(--pgreen);font-weight:600;}
.sumbox2 .sr.tot{font-weight:700;color:var(--ink);font-size:14px;border-top:1px dashed var(--line);margin-top:6px;padding-top:7px;}
.pur-cta{width:100%;margin-top:14px;padding:13px;font-size:14px;border-radius:12px;}
.pur-trust{text-align:center;font-size:11px;color:var(--muted);margin-top:12px;}
.pur-trust .star{color:var(--orange);}
/* fields */
.fld{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font:400 13px 'Rubik',sans-serif;color:var(--ink);text-align:right;background:#fff;margin-top:8px;outline:none;}
.fld::placeholder{color:var(--muted);}
.fld:focus{border-color:var(--pink);}
.fld-row{display:flex;gap:8px;}
.fld-row>*{flex:1;margin-top:8px;}
.cc-wrap{position:relative;}
.cc-wrap .cc{padding-inline-start:72px;}
.cc-brand{position:absolute;left:12px;top:calc(50% + 4px);transform:translateY(-50%);font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;}
.cc-brand.ok{color:var(--pgreen);}.cc-brand.bad{color:#c0392b;}
.wal{width:100%;border-radius:10px;padding:12px;text-align:center;font:600 13px 'Rubik',sans-serif;margin-top:8px;cursor:pointer;border:1px solid var(--line);}
.wal.ap{background:#000;color:#fff;border-color:#000;}
.wal.gp{background:#fff;color:#3c4043;}
.pur-or{text-align:center;font-size:11px;color:var(--muted);margin-top:10px;}
.inst-row{display:flex;align-items:center;gap:6px;margin-top:12px;justify-content:flex-end;flex-wrap:wrap;}
.inst-l{font-size:12px;color:var(--muted);margin-inline-end:auto;}
.chip2{background:#f4f2ee;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font:400 12px 'Rubik',sans-serif;color:var(--ink);cursor:pointer;}
.chip2.on{background:#fde8ef;border-color:var(--pink);color:var(--pink);font-weight:600;}
.split-btn{width:100%;margin-top:12px;background:none;border:1px solid var(--link);color:var(--link);border-radius:10px;padding:11px;font:600 13px 'Rubik',sans-serif;cursor:pointer;}
/* sticky footer (checkout / friend) */
.pur-foot{position:fixed;bottom:0;left:0;right:0;max-width:375px;margin-inline:auto;background:#fff;border-top:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:60;box-shadow:0 -4px 16px rgba(0,0,0,.08);}
.pf-sum{font-size:11px;color:var(--muted);display:flex;flex-direction:column;flex-shrink:0;text-align:right;}
.pf-sum b{font-size:16px;color:var(--ink);}
.pf-cta{flex:1;padding:13px;font-size:14px;border-radius:12px;}
/* confirmation */
.conf-hero{text-align:center;padding:14px 0 6px;}
.conf-tick{width:56px;height:56px;border-radius:50%;background:var(--pgreenbg);color:var(--pgreen);font-size:30px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.conf-t{font-size:20px;font-weight:700;color:var(--ink);}
.conf-s{font-size:12px;color:var(--muted);margin-top:3px;}
.btn2{flex:1;background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px;font:600 13px 'Rubik',sans-serif;color:var(--ink);cursor:pointer;margin-top:8px;}
.btn2.wa{background:#25d366;color:#fff;border-color:#25d366;}
.btn2.bit{border-color:#0a8fd8;color:#0a8fd8;}
.btn2.blue,.btn2.rem{border-color:var(--link);color:var(--link);}
.link-btn.ctr{display:block;width:100%;text-align:center;margin-top:12px;}
.pur-note{font-size:12px;color:#555;line-height:1.6;text-align:right;margin-top:12px;background:#faf7f2;border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
.pur-note b{color:var(--ink);}
.pur-note.ok{background:var(--pgreenbg);border-color:#bfe8cf;color:var(--pgreen);font-weight:600;text-align:center;}
.pur-note.ctr{text-align:center;background:none;border:none;color:var(--muted);}
.split-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px;font-size:13px;color:var(--ink);font-weight:600;}
.split-modes{display:flex;gap:8px;margin-top:10px;justify-content:flex-end;}
.linkbox2{display:flex;align-items:center;gap:8px;border:1px dashed var(--link);border-radius:10px;padding:10px 12px;margin-top:12px;}
.lb-url{flex:1;font-size:12px;color:var(--link);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-cp{background:var(--link);color:#fff;border:none;border-radius:8px;padding:6px 12px;font:700 11px 'Rubik',sans-serif;cursor:pointer;flex-shrink:0;}
.fr-list{margin-top:12px;}
.fr-row{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line);}
.fr-av{width:30px;height:30px;border-radius:50%;background:#e6e1d7;flex-shrink:0;}
.fr-n{font-size:13px;color:var(--ink);}
.fr-pd{margin-inline-start:auto;font-size:12px;font-weight:600;}
.fr-pd.y{color:var(--pgreen);}.fr-pd.n{color:var(--muted);}
.edge-note{background:#fff8ea;border:1px solid #f0dcae;border-radius:10px;padding:10px 12px;font-size:12px;color:#7a5b12;text-align:right;margin-bottom:12px;}
.edge-note b{color:#5a4207;}
.edge-ic{font-size:40px;}
.alt-price{font-size:14px;font-weight:700;color:var(--ink);flex-shrink:0;}
/* toast */
.toast{position:fixed;bottom:82px;left:50%;transform:translate(-50%,10px);background:#27324a;color:#fff;font-size:12.5px;font-weight:600;padding:10px 16px;border-radius:999px;z-index:200;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;max-width:90%;}
.toast.show{opacity:1;transform:translate(-50%,0);}

/* ---- 18 · Account gate (guest-first login) ---- */
.acc-guest{width:100%;margin-top:16px;background:#fff;border:1.5px solid var(--ink);color:var(--ink);border-radius:999px;padding:14px;font:700 14px 'Rubik',sans-serif;cursor:pointer;}
.acc-or{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:11px;margin:18px 0;}
.acc-or::before,.acc-or::after{content:"";flex:1;height:1px;background:var(--line);}
.acc-h{font-size:18px;font-weight:700;color:var(--ink);text-align:right;margin-bottom:8px;}
.acc-lbl{display:block;font-size:12px;font-weight:600;color:var(--ink);text-align:right;margin-bottom:4px;}
.acc-email{margin-top:0;direction:ltr;text-align:left;}
.acc-cont{width:100%;margin-top:12px;background:var(--ink);color:#fff;border:none;border-radius:999px;padding:14px;font:700 14px 'Rubik',sans-serif;cursor:pointer;}
.acc-trouble{display:block;width:100%;text-align:center;margin-top:12px;background:none;border:none;color:var(--link);font:600 12px 'Rubik',sans-serif;text-decoration:underline;cursor:pointer;}
.acc-social{width:100%;margin-top:10px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:12px;font:600 13px 'Rubik',sans-serif;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;}
.acc-social:hover{border-color:#cfcfcf;}
.acc-ic{width:20px;height:20px;flex-shrink:0;display:inline-flex;}
.acc-ic svg{width:20px;height:20px;}
.acc-terms{font-size:11px;color:var(--muted);line-height:1.6;text-align:right;margin-top:18px;}
.acc-terms a{color:var(--link);text-decoration:underline;cursor:pointer;}

/* ============ Order screen — refined (Figma 235:27609) ============ */
.pur-safety{display:flex;align-items:center;gap:9px;background:var(--slate);color:#fff;padding:10px 14px;}
.pur-safety span{flex:1;text-align:right;font-size:13px;font-weight:500;line-height:1.4;}
.pur-safety .ic-shield{width:20px;height:20px;flex-shrink:0;}
/* pink hold timer */
.otimer{display:flex;align-items:center;gap:12px;background:#ffe7ef;border:1px solid var(--pink);border-radius:8px;padding:12px;}
.otimer.warn{background:#fff3e0;border-color:var(--amber);}
.otimer.exp{background:#fdeaea;border-color:#c0392b;}
.otimer .ot-txt{flex:1;text-align:right;min-width:0;}
.otimer .ot-row{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
.otimer .ot-clk{background:#ed195f;color:#fff;font-weight:700;font-size:12px;border-radius:6px;padding:2px 8px;font-variant-numeric:tabular-nums;flex-shrink:0;}
.otimer.warn .ot-clk{background:var(--amber);} .otimer.exp .ot-clk{background:#c0392b;}
.otimer .ot-main{font-size:14px;font-weight:600;color:#373737;}
.otimer .ot-sub{font-size:12px;color:#373737;margin-top:2px;}
.otimer .ic-lock{width:34px;height:34px;color:var(--pink);flex-shrink:0;}
.otimer.warn .ic-lock{color:var(--amber);} .otimer.exp .ic-lock{color:#c0392b;}
/* order summary card */
.pur-ev.sum{flex-direction:column;align-items:stretch;gap:11px;padding:17px 11px 11px;}
.sum-label{font-size:12px;color:var(--pink);text-align:right;}
.sum-ev{display:flex;gap:12px;align-items:flex-start;}
.pur-ev.sum .pur-ev-img{width:80px;height:80px;}
.pur-ev.sum .pur-ev-i{flex:1;text-align:right;min-width:0;display:flex;flex-direction:column;gap:8px;}
.pur-ev.sum .pur-ev-t{font-size:17px;font-weight:600;color:var(--ink);}
.pur-ev.sum .pur-ev-s{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted);margin-top:0;}
.sum-div{height:1px;background:var(--line);width:100%;}
.sum-seat{display:flex;flex-direction:column;align-items:flex-end;gap:8px;text-align:right;}
.sum-seat .ss-t{font-size:14px;font-weight:600;color:var(--ink);width:100%;}
.sum-seat .pur-ev-s{width:100%;display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted);}
.val-chip{display:inline-flex;align-items:center;gap:6px;background:#faf7f2;border-radius:4px;padding:4px 6px;align-self:flex-end;direction:rtl;}
.val-chip .vc-label{font-size:12px;color:#2f2f2f;}
.val-chip .vc-score{background:var(--orange);color:#fff;font-size:12px;border-radius:4px;padding:2px 8px;font-weight:600;line-height:1.1;}
/* מילואים card — link */
.pur-card .pc-s .pc-link{color:#353535;text-decoration:underline;cursor:pointer;}
/* login inline (order) */
.acc-inline{margin-top:8px;}
.acc-inline .acc-h{font-size:18px;font-weight:700;color:var(--ink);text-align:right;margin:14px 0 8px;}
.acc-socials{display:flex;gap:10px;justify-content:center;margin-top:2px;}
.acc-soc{width:46px;height:46px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.acc-soc svg{width:20px;height:20px;}
.acc-reg{display:block;width:100%;text-align:center;margin-top:12px;background:none;border:none;color:#000;font:400 12px 'Rubik',sans-serif;text-decoration:underline;cursor:pointer;}
.terms-row{display:flex;gap:8px;align-items:flex-start;margin-top:14px;direction:rtl;cursor:pointer;}
.terms-row .cbx{width:16px;height:16px;flex-shrink:0;margin-top:2px;accent-color:var(--pink);}
.terms-row span{flex:1;font-size:12px;color:var(--muted);line-height:1.5;text-align:right;}
/* squared login buttons to match the Figma */
.acc-cont,.acc-guest{border-radius:12px;}

/* ---- Order redesign v2 (Figma 235:27609 · quantity + add-ons + coupon) ---- */
.pur-safety{background:#27324a;}
.ord-sec{display:flex;flex-direction:column;gap:10px;}
.ord-sec .pur-card{margin-top:0;}
.seat-head{display:flex;flex-direction:column;align-items:flex-end;gap:2px;text-align:right;width:100%;}
.seat-head .ss-t{font-size:15px;font-weight:600;color:var(--ink);width:100%;}
.seat-head .pur-ev-s{width:100%;margin-top:0;}
/* quantity stepper */
.qstep{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.qbtn{width:18px;height:18px;border:1px solid var(--line);border-radius:999px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;color:var(--ink);cursor:pointer;padding:0;}
.qbtn:active{background:#f4f4f4;}
.qnum{border:1px solid var(--ink);border-radius:12px;padding:9px 0;min-width:40px;text-align:center;font-weight:700;font-size:14px;color:var(--ink);}
/* add-on "הוסף" toggle button */
.add-btn{background:#fff;border:1px solid var(--ink);border-radius:12px;padding:9px 15px;font:700 14px 'Rubik',sans-serif;color:var(--ink);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.add-btn.on{background:var(--ink);color:#fff;}
.pc-shield{width:32px;height:32px;flex-shrink:0;}
/* coupon card */
.pur-ev.cpn{flex-direction:column;align-items:stretch;gap:8px;padding:13px;}
.cpn-t{font-size:14px;font-weight:600;color:var(--ink);text-align:right;}
.cpn-in{width:100%;}
.cpn-btn{width:100%;}
/* summary box title */
.sumbox2 .sb-title{font-size:18px;font-weight:700;color:var(--ink);text-align:right;margin-bottom:10px;}

</style>
</head>
