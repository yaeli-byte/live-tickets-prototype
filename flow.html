function matchImg(text){

  if(/ליגת האלופות|אלופות|champions/.test(t)) return 'ucl.jpg';
  if(/מונדיאל|נבחרת|גביע העולם|world cup/.test(t)) return 'sport2.jpg';

  return 'sport1.jpg';
}

  {key:'clasico',      name:'אל קלאסיקו',        pair:['real','barca'],     nicknames:['אל קלאסיקו','קלאסיקו','סופר קלאסיקו','el clásico','el clasico','super clasico','clasico','classico','klasiko']},

// Scheduled meetings, keyed by an (order-independent) team pair.
const FIXTURES = [
  {pair:['real','barca'], rivalry:'clasico', title:'ריאל מדריד נגד ברצלונה', date:'שבת · 14 יולי 2026',   comp:'לה ליגה', venue:'סנטיאגו ברנבאו, מדריד', price:'₪690', img:'team-realmadrid.jpg', ev:'clasico'},
  {pair:['real','barca'], rivalry:'clasico', title:'ברצלונה נגד ריאל מדריד', date:'ראשון · 20 דצמבר 2026', comp:'לה ליגה', venue:'קאמפ נואו, ברצלונה', price:'₪780', img:'team-barcelona.jpg', ev:'match', evTitle:'ברצלונה נגד ריאל מדריד', evVenue:'קאמפ נואו, ברצלונה', evPrice:'₪780', evDate:'20 דצמבר 2026', evImg:'team-barcelona.jpg'},
];
function mNorm(s){ return (s||'').toString().toLowerCase().replace(/[.'"׳״]/g,'').replace(/\s+/g,' ').trim(); }
function mSamePair(a,b){ return a&&b&&a.length===2&&b.length===2 && ((a[0]===b[0]&&a[1]===b[1])||(a[0]===b[1]&&a[1]===b[0])); }
function mFindRivalry(pair){ return RIVALRIES.find(r=>mSamePair(r.pair,pair))||null; }
// Alias hit score: full substring match (strong) or last-word prefix while typing (weak).
function mAliasHit(text, alias){
  const t=mNorm(text), na=mNorm(alias); if(!na||!t) return 0;
  if(t.includes(na)) return na.length;
  const last=t.split(' ').pop();
  if(last.length>=3 && na.startsWith(last)) return last.length*0.4;
  return 0;
}
function mResolveTeam(text){
  let best=null,bestScore=0;
  for(const tm of TEAMS){ for(const a of tm.aliases){ const s=mAliasHit(text,a); if(s>bestScore){ best=tm; bestScore=s; } } }
  return best;
}
function mTeamGames(key){ return FIXTURES.filter(f=>f.pair.includes(key)); }
function mBuild(pair, rivalry){
  const teams=pair.map(k=>TEAMS.find(t=>t.key===k)).filter(Boolean);
  return {teams, pair, rivalry:rivalry||mFindRivalry(pair), fixtures:FIXTURES.filter(f=>mSamePair(f.pair,pair))};
}
// Returns {teams,pair,rivalry,fixtures} or null. Order-independent.
function resolveMatchup(query){
  const raw=(query||'').trim(); if(!raw) return null;
  const q=mNorm(raw);
  // 1) rivalry / nickname (longest match wins)
  let rHit=null,rLen=0;
  for(const r of RIVALRIES){ for(const n of r.nicknames){ const nn=mNorm(n); if(nn && q.includes(nn) && nn.length>rLen){ rHit=r; rLen=nn.length; } } }
  if(rHit) return mBuild(rHit.pair, rHit);
  // 2) head-to-head connector: TeamA (נגד|מול|vs|v|-) TeamB
  const parts=raw.split(/\s*(?:\bנגד\b|\bמול\b|\bvs\.?\b|\bv\b|\s-\s)\s*/i).filter(Boolean);
  if(parts.length>=2){ const a=mResolveTeam(parts[0]), b=mResolveTeam(parts[1]); if(a&&b&&a.key!==b.key) return mBuild([a.key,b.key]); }
  // 3) two known teams anywhere (order-independent, no connector; supports mid-typing)
  const found=[];
  for(const tm of TEAMS){ if(tm.aliases.some(al=>mAliasHit(raw,al)>0)){ if(!found.includes(tm.key)) found.push(tm.key); } }
  if(found.length>=2) return mBuild([found[0],found[1]]);
  return null;
}

function aiRespond(query){

const MONDIAL_BRACKET = {
  r16:[
    {a:{n:'קנדה',f:'🇨🇦',s:'0'}, b:{n:'מרוקו',f:'🇲🇦',s:'3'}, when:'הסתיים', done:true},
    {a:{n:'פרגוואי',f:'🇵🇾'}, b:{n:'צרפת',f:'🇫🇷'}, when:'מחר · 00:00'},
    {a:{n:'ארה״ב',f:'🇺🇸'}, b:{n:'בלגיה',f:'🇧🇪'}, when:'ג׳ 7 יול · 3:00'},
    {a:{n:'פורטוגל',f:'🇵🇹'}, b:{n:'ספרד',f:'🇪🇸'}, when:'ב׳ 6 יול · 22:00'},
  ],
  qf:[
    {a:{n:'מרוקו',f:'🇲🇦'}, b:{n:'TBD',f:'🛡'}, when:'ה׳ 9 יול · 23:00'},
    {a:{n:'TBD',f:'🛡'}, b:{n:'TBD',f:'🛡'}, when:'ו׳ 10 יול · 22:00'},
  ],
};
function mondialBracket(){
  const tr=t=>`<div class="bt-row"><span class="bt-flag">${t.f}</span><span class="bt-name">${t.n}</span><span class="bt-score">${t.s!==undefined?t.s:''}</span></div>`;

    <div class="bm-when">${m.done?'<span class="bm-ft">הסתיים</span>':''}${m.when}</div>${tr(m.a)}${tr(m.b)}</button>`;
  return `
  <section class="section">
    <div class="sec-head"><span></span><h2 class="sec-title">טבלת המשחקים</h2></div>
    <div class="brk-tabs">${['שלב הבתים','שמינית גמר','רבע גמר','חצי גמר','גמר'].map((t,i)=>`<button class="brk-tab ${i===1?'on':''}">${t}</button>`).join('')}</div>
    <div class="bracket">
      <div class="brk-col"><div class="brk-lbl">שמינית גמר</div>${MONDIAL_BRACKET.r16.map(card).join('')}</div>
      <div class="brk-col brk-col2"><div class="brk-lbl">רבע גמר</div>${MONDIAL_BRACKET.qf.map(card).join('')}</div>
    </div>
  </section>`;
}

function dpLabel(){

function dateSheet(target){

/* ---- Search intent engine (ported from the prototype) ---- */
function srDetectIntent(q){
  if(!q) return 'idle';
  const ql=q.toLowerCase();
  const city=D.SR_CITIES.find(c=>c.name.includes(q)||ql.includes(c.name.toLowerCase()));
  const cat=D.srCats.find(c=>c.tags.some(t=>ql.includes(t)));
  const perf=D.SR_PERF.find(p=>p.tags.some(t=>ql.includes(t)));
  if(perf) return 'performer';
  if(city) return 'location';
  if(cat) return 'category';
  return 'performer';
}
function srTypeahead(q){
  if(!q.trim()) return [];
  const ql=q.toLowerCase(), intent=srDetectIntent(q), rows=[];
  // Matchup / rivalry / H2H resolves ABOVE literal suggestions.
  // When it resolves, we suppress the generic literal rows so every suggestion
  // leads to the matchup (not an unrelated stub that lands on Coldplay).
  const mu=resolveMatchup(q);
  if(mu){
    if(mu.fixtures.length){
      mu.fixtures.slice(0,2).forEach(f=>rows.push({kind:'matchup',label:f.title,sub:(mu.rivalry?mu.rivalry.name+' · ':'')+f.date+' · מ-'+f.price,thumb:f.img,fx:f}));
    } else {
      rows.push({kind:'matchup',label:(mu.rivalry?mu.rivalry.name:mu.teams.map(t=>t.name).join(' נגד ')),sub:'אין משחק מתוזמן · הצגת אפשרויות',thumb:(mu.teams[0]||{}).img,muQ:q});
    }
    rows.push({kind:'all',label:'כל התוצאות עבור "'+q+'"',sub:'',icon:'🔍'});
    return rows;
  }
  const topPerf=D.SR_PERF.find(p=>p.tags.some(t=>ql.includes(t)));
  const topCity=D.SR_CITIES.find(c=>c.name.includes(q)||ql.includes(c.name.toLowerCase()));
  const topCat=D.srCats.find(c=>c.tags.some(t=>ql.includes(t)));
  const topEvt=D.SR_EVENTS.find(e=>e.name.toLowerCase().includes(ql));
  const top=topPerf||topCity||topCat||topEvt;
  if(top) rows.push({kind:'top',label:top.name||'',sub:top.meta||top.date||'',icon:top.icon||'🔍',ev:top.ev,navP:top.lobby,navTeam:top.teamKey});
  if(intent==='performer'&&topPerf){
    D.SR_EVENTS.filter(e=>e.perfKey===topPerf.key).slice(0,3).forEach(e=>rows.push({kind:'event',label:e.name,sub:e.date+' · '+e.venue+' · '+e.price,icon:'🎫',ev:e.ev}));
    D.SR_PERF.filter(p=>p.type===topPerf.type&&p.key!==topPerf.key).slice(0,2).forEach(p=>rows.push({kind:'performer',label:p.name,sub:p.meta,icon:p.icon,navP:p.lobby,navTeam:p.teamKey}));
  } else if(intent==='location'&&topCity){
    D.SR_EVENTS.filter(e=>e.city===topCity.name).slice(0,3).forEach(e=>rows.push({kind:'event',label:e.name,sub:e.date+' · '+e.price,icon:'🎫',ev:e.ev}));
  } else if(intent==='category'&&topCat){
    D.srCats.filter(c=>c.key!==topCat.key).slice(0,2).forEach(c=>rows.push({kind:'category',label:c.name,sub:'',icon:c.icon}));
    D.SR_EVENTS.filter(e=>e.cat==='category'||(topCat.key==='football'&&e.cat==='team')).slice(0,3).forEach(e=>rows.push({kind:'event',label:e.name,sub:e.date+' · '+e.price,icon:'🎫',ev:e.ev}));
  }
  rows.push({kind:'all',label:'כל התוצאות עבור "'+q+'"',sub:'',icon:'🔍'});
  return rows.slice(0,8);
}
function srResults(q){
  if(!q.trim()) return {topMatch:null,events:[],performers:[],cities:[],categories:[]};
  const ql=q.toLowerCase(), intent=srDetectIntent(q);
  const topPerf=D.SR_PERF.find(p=>p.tags.some(t=>ql.includes(t)));
  const topCity=D.SR_CITIES.find(c=>c.name.includes(q)||ql.includes(c.name.toLowerCase()));
  const topCat=D.srCats.find(c=>c.tags.some(t=>ql.includes(t)));
  let events=[],performers=[],cities=[],categories=[];
  if(intent==='performer'&&topPerf){
    events=D.SR_EVENTS.filter(e=>e.perfKey===topPerf.key);
    performers=D.SR_PERF.filter(p=>p.type===topPerf.type&&p.key!==topPerf.key).slice(0,4);
    cities=D.SR_CITIES.slice(0,3);
  } else if(intent==='location'&&topCity){
    events=D.SR_EVENTS.filter(e=>e.city===topCity.name);
    performers=D.SR_PERF.slice(0,4);
    cities=D.SR_CITIES.filter(c=>c.key!==topCity.key).slice(0,3);
  } else if(intent==='category'&&topCat){
    events=D.SR_EVENTS.filter(e=>e.cat==='team'||e.cat==='category').slice(0,5);
    categories=D.srCats; performers=D.SR_PERF.filter(p=>p.type==='team').slice(0,4);
  } else {
    events=D.SR_EVENTS.filter(e=>e.name.toLowerCase().includes(ql)).slice(0,5);
    performers=D.SR_PERF.filter(p=>p.name.includes(q)).slice(0,4);
  }
  return {topMatch:topPerf||topCity||topCat,events,performers,cities,categories};
}

          <button class="sort-btn ${state.srSortBy==='best'?'on':''}" data-srsort="best">${srSortLabel.best}</button>
        </div>
        <div class="res-title">תוצאות עבור "${q}"</div>
      </div>
      <div class="ai-overview">
        <div class="ai-oh"><span class="dot">✦</span> סקירת AI</div>
        <p class="ai-osum">${aiRespond(q).summary} <span class="fade">כל המחירים כוללים עמלות.</span></p>
        <button class="ai-ogo" data-act="ai-open" data-q="${q.replace(/"/g,'&quot;')}">המשיכו לשיחה ←</button>
      </div>`;
    out+=matchupBlock(q);   // matchup / H2H outranks generic team/city grouping
    if(r.topMatch) out+=`
      <div class="res-top" data-act="sr-perf" data-p="${r.topMatch.lobby||2}" data-team="${r.topMatch.teamKey||''}">
        <span class="res-cta">${r.topMatch.lobby===7?'לעמוד הקבוצה ›':'לאמן ›'}</span>
        <div class="tx"><div class="n">${r.topMatch.name}</div><div class="s">${r.topMatch.meta||''}</div></div>
        <img class="ov-thumb" src="${IMG}${srThumb(r.topMatch.name)}" alt="">
      </div>`;
    if(r.events.length){ out+=sec('אירועים')+`<div class="res-evs">`+r.events.map(e=>`
      <div class="res-ev" data-act="sr-event" data-ev="${e.ev||'coldplay'}">
        <button class="ev-heart ${state.srHearts[e.id]?'on':''}" data-heart="sr_${e.id}">${ICON.hs}</button>
        <div class="ev-body">
          <div class="ev-name">${e.name}</div>
          <div class="ev-sub">${e.date} · ${e.venue}</div>
          <div class="ev-pricerow"><span class="amt">מ-${e.price}</span><span class="fees"> · כולל עמלות</span><span class="ok"> · אישור מיידי</span></div>
        </div>
        <img class="ev-thumb" src="${IMG}${SR_EVENT_IMG[e.perfKey]||'artist3.jpg'}" alt="">
      </div>`).join('')+`</div>`; }
    if(r.performers.length){ out+=sec('אמנים')+r.performers.map(p=>`<div class="ov-row" data-act="sr-perf" data-p="${p.lobby||2}" data-team="${p.teamKey||''}"><div class="tx"><div class="n">${p.name}</div><div class="m">${p.meta||''}</div></div><img class="ov-thumb" src="${IMG}${srThumb(p.name)}" alt=""></div>`).join(''); }
    if(r.cities.length){ out+=sec('מיקומים')+r.cities.map(c=>`<div class="ov-row" data-act="sr-setq" data-q="${c.name}"><div class="tx"><div class="n">${c.name}</div><div class="s">${c.meta}</div></div><img class="ov-thumb" src="${IMG}${srThumb(c.name)}" alt=""></div>`).join(''); }
    if(r.categories.length){ out+=sec('קטגוריות')+`<div class="ov-chips">`+r.categories.map(c=>`<button class="res-chip" data-act="sr-cat-nav">${c.icon} ${c.name}</button>`).join('')+`</div>`; }
    body=out;
  }
  return `
  <div class="overlay ${open?'open':''}">
    <div class="ov-head">
      <button class="ov-close" data-act="close-search">סגירה</button>
      <div class="field"><button class="ai-pill" data-act="ai-open" data-q-field="1">✦ חיפוש AI</button><input id="srInput" data-srinput placeholder="חפשו אמן, קבוצה, עיר, ז׳אנר…" value="${q.replace(/"/g,'&quot;')}" autocomplete="off">${q?'<button class="ov-x" data-act="sr-clear">✕</button>':''}${ICON.searchSm}</div>
    </div>
    <div class="ov-body">${body}</div>
    ${searchFilterSheet()}
  </div>`;
}
function searchFilterSheet(){
  const open=state.srFilterSheet;
  return `
  <div class="sheet-backdrop ${open?'open':''}" data-act="sr-filter-close"></div>
  <div class="sheet ${open?'open':''}">
    <div class="grab"></div>
    <div class="sh-head"><h3>סינון</h3><button class="x" data-act="sr-filter-close">×</button></div>
    <div class="sh-body">
      <div class="ff-label">תאריך</div>
      <div class="ov-chips">${['כל התאריכים','סוף שבוע','החודש'].map(d=>`<button class="chip">${d}</button>`).join('')}</div>
      <div class="ff-label">עיר</div>
      <div class="ov-chips">${['לונדון','פריז','מדריד'].map(c=>`<button class="chip">${c}</button>`).join('')}</div>
    </div>
    <div class="sh-cta"><button class="btn btn-pink" style="width:100%" data-act="sr-filter-close">החל סינון</button></div>
  </div>`;
}

/* ============================================================
   BEHAVIOUR
   ============================================================ */
function set(patch){ Object.assign(state, patch); render(); }
function go(page){ stopPlaylistAudio(); state.playing=false; state.headerSolid=false; state.heroCollapsed=false; window.scrollTo(0,0); set({page, openSheet:null, srOpen:false, drawerOpen:false, acctOpen:false}); }

/* ---- Spotify playlist: real in-page audio (Web Audio API) ---- */
let audioCtx=null, audioTimer=null;
const PL_NOTES=[523.25,659.25,783.99,659.25,587.33,698.46,880.0,698.46];
function playlistToggle(){
  state.playing=!state.playing;
  if(state.playing) startPlaylistAudio(); else stopPlaylistAudio();
  render();
}
function startPlaylistAudio(){
  try{ audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
  catch(_){ return; }
  state.playIdx=0;
  const step=()=>{
    if(!audioCtx) return;
    const t=audioCtx.currentTime;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='triangle'; o.frequency.value=PL_NOTES[state.playIdx%PL_NOTES.length];
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.16,t+0.03); g.gain.exponentialRampToValueAtTime(0.0008,t+0.42);
    o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t+0.45);
    state.playIdx++;
  };
  step(); audioTimer=setInterval(step, 420);
}
function stopPlaylistAudio(){ if(audioTimer){clearInterval(audioTimer);audioTimer=null;} }
// seat map: tap a price pin (or zone) → highlight the matching listing & scroll to it
function locate(key){
  state.highlightListing = key;
  state.selectedSection = null;   // clear any active filter so the card is in the list
  render();
  // scroll the CARDS SECTION internally (not the page) so the matching card
  // becomes visible while the seat map stays on screen.
  requestAnimationFrame(()=>{
    const cont = document.querySelector('.lst-cards');
    const el = document.querySelector('.lcard.hl');
    if(!cont || !el) return;
    const contR = cont.getBoundingClientRect(), elR = el.getBoundingClientRect();
    const target = cont.scrollTop + (elR.top - contR.top) - (cont.clientHeight/2 - elR.height/2);
    cont.scrollTo({top: Math.max(0, target), behavior:'smooth'});
  });
}

function wire(){
  // rails: drag + wheel
  document.querySelectorAll('.hscroll').forEach(enableDrag);
  // inputs: price fields (no re-render) + live search (re-render + refocus)
  document.getElementById('app').oninput = (e)=>{
    const fp = e.target.closest('[data-fprice]');
    if(fp){ if(fp.getAttribute('data-fprice')==='min') state.p3Min=fp.value; else state.p3Max=fp.value; return; }
    const si = e.target.closest('[data-srinput]');
    if(si){
      state.srQuery = si.value;
      state.srPhase = si.value.trim() ? 'typing' : 'idle';
      render();
      const inp=document.getElementById('srInput');
      if(inp){ inp.focus(); const n=inp.value.length; try{inp.setSelectionRange(n,n);}catch(_){} }
    }
  };
  document.getElementById('app').onkeydown = (e)=>{
    if(e.key==='Enter' && e.target.closest('[data-srinput]') && state.srQuery.trim()){ set({srPhase:'results'}); }
    else if(e.key==='Enter' && e.target.id==='aiInput'){ e.preventDefault(); aiSend(e.target.value); }
  };
  // focus the search field when the overlay opens (don't steal focus mid-typing)
  if(state.srOpen){ const i=document.getElementById('srInput'); if(i && document.activeElement!==i){ i.focus(); const n=i.value.length; try{i.setSelectionRange(n,n);}catch(_){} } }

  document.getElementById('app').onclick = (e)=>{
    const heart = e.target.closest('[data-heart]');
    if(heart){ const k=heart.getAttribute('data-heart');
      if(k.startsWith('sr_')){ const id=k.slice(3); state.srHearts[id]=!state.srHearts[id]; }
      else state.hearts[k]=!state.hearts[k];
      render(); return; }
    const srsort = e.target.closest('[data-srsort]');
    if(srsort){ set({srSortBy: srsort.getAttribute('data-srsort')}); return; }
    const faq = e.target.closest('[data-faq]');
    if(faq){ const i=+faq.getAttribute('data-faq'); set({faqOpen: state.faqOpen===i?-1:i}); return; }
    const faq2 = e.target.closest('[data-faq2]');
    if(faq2){ const i=+faq2.getAttribute('data-faq2'); set({faqP2Open: state.faqP2Open===i?-1:i}); return; }
    const faq3 = e.target.closest('[data-faq3]');
    if(faq3){ const i=+faq3.getAttribute('data-faq3'); set({faqP3Open: state.faqP3Open===i?-1:i}); return; }
    const faqh = e.target.closest('[data-faqh]');
    if(faqh){ const i=+faqh.getAttribute('data-faqh'); set({faqHome: state.faqHome===i?-1:i}); return; }
    const faqs = e.target.closest('[data-faqs]');
    if(faqs){ const i=+faqs.getAttribute('data-faqs'); set({faqSportOpen: state.faqSportOpen===i?-1:i}); return; }
    const nbatab = e.target.closest('[data-nbatab]');
    if(nbatab){ state.nbaTab=nbatab.getAttribute('data-nbatab'); render();
      const el=document.getElementById(nbatab.getAttribute('data-scroll'));
      if(el){ const y=el.getBoundingClientRect().top+window.scrollY-64; window.scrollTo({top:Math.max(0,y),behavior:'instant'}); }
      return; }
    // follow a team/player from a card → toggles "followed" + header ♡ count (doesn't navigate)
    const ft = e.target.closest('[data-follow-team]');
    if(ft){ const k=ft.getAttribute('data-follow-team'); const on=!state.followed[k];
      state.followed[k]=on; state.favCount=Math.max(0,state.favCount+(on?1:-1)); render(); return; }
    const loc = e.target.closest('[data-locate]');
    if(loc){ locate(loc.getAttribute('data-locate')); return; }
    const sortEl = e.target.closest('[data-sort]');
    if(sortEl){ set({sortBy: sortEl.getAttribute('data-sort')}); return; }
    const fsec = e.target.closest('[data-fsec]');
    if(fsec){ const k=fsec.getAttribute('data-fsec'); set({selectedSection: state.selectedSection===k?null:k}); return; }
    const fqty = e.target.closest('[data-fqty]');
    if(fqty){ const n=+fqty.getAttribute('data-fqty'); set({p3Qty: state.p3Qty===n?null:n}); return; }
    const fchar = e.target.closest('[data-fchar]');
    if(fchar){ const k=fchar.getAttribute('data-fchar'); state.p3f[k]=!state.p3f[k]; render(); return; }
    const dayEl = e.target.closest('[data-day]');
    if(dayEl){
      const d=+dayEl.getAttribute('data-day'); const ts=new Date(state.dpYear,state.dpMonth,d).getTime();
      if(!state.dpStart || state.dpEnd) set({dpStart:ts, dpEnd:null});
      else if(ts===state.dpStart) set({dpStart:null, dpEnd:null});
      else if(ts<state.dpStart) set({dpStart:ts, dpEnd:state.dpStart});
      else set({dpEnd:ts});
      return;
    }
    const flexEl = e.target.closest('[data-flex]');
    if(flexEl){ set({dpFlex:flexEl.getAttribute('data-flex')}); return; }
    const sh = e.target.closest('[data-sheet]');
    if(sh){ set({openSheet: sh.getAttribute('data-sheet')}); return; }
    const pick = e.target.closest('[data-pick]');
    if(pick){
      const [k,v]=pick.getAttribute('data-pick').split(':');
      if(k==='genre') set({p1GenreSelected:v, openSheet:null});
      else if(k==='city') set({p1CitySelected:v, openSheet:null});
      else if(k==='date') set({p1DateLabel:v, openSheet:null});
      else if(k==='p2date') set({p2DateSel:v, openSheet:null});
      else if(k==='p2city') set({p2CitySel:v, openSheet:null});
      else if(k==='p2qty') set({p2QtySel:v, openSheet:null});
      return;
    }
    const a = e.target.closest('[data-act]'); if(!a) return;
    const act = a.getAttribute('data-act');
    switch(true){
      case act==='drawer': set({drawerOpen:true, acctOpen:false}); break;
      case act==='account': set({acctOpen:true, drawerOpen:false}); break;
      case act==='favs': { state.phTitle='המועדפים שלי'; state.phNote='העמוד הזה עדיין בעיצוב — בקרוב'; go(8); break; }
      case act==='search': set({srOpen:true, srQuery:'', srPhase:'idle'}); break;
      case act==='ai-open': { let q=a.getAttribute('data-q'); if(q===null && a.hasAttribute('data-q-field')) q=state.srQuery; openAI(q||''); break; }
      case act==='ai-send': { const i=document.getElementById('aiInput'); aiSend(i?i.value:''); break; }
      case act==='ai-fup': aiSend(a.getAttribute('data-q')||''); break;
      case act==='ai-back': go(state.aiReturn||0); break;
      case act==='close-search': set({srOpen:false, srFilterSheet:false}); break;
      case act==='sr-clear': set({srQuery:'', srPhase:'idle'}); break;
      case act==='sr-clear-recent': set({srRecent:[]}); break;
      case act==='sr-all': set({srPhase:'results'}); break;
      case act==='sr-setq': set({srQuery: a.getAttribute('data-q')||'', srPhase:'results'}); break;
      case act==='sr-event': { const ev=a.getAttribute('data-ev')||'coldplay'; state.eventKey=ev; state.srQuery=''; state.srPhase='idle'; state.srFilterSheet=false; go(3); break; }
      case act==='sr-perf': { const p=parseInt(a.getAttribute('data-p'),10)||2; if(p===7) state.teamKey=a.getAttribute('data-team')||'real'; state.srQuery=''; state.srPhase='idle'; state.srFilterSheet=false; go(p); break; }
      case act==='sr-cat-nav': state.srQuery=''; state.srPhase='idle'; state.srFilterSheet=false; go(1); break;
      case act==='sr-filter': set({srFilterSheet:true}); break;
      case act==='sr-filter-close': set({srFilterSheet:false}); break;
      case act==='mu-follow': set({muFollowed:true}); break;
      case act==='close-drawer': set({drawerOpen:false, acctOpen:false, drawerSection:null, drawerMusicGroup:null, mSport:null, mComp:null}); break;
      case act==='close-sheet': set({openSheet:null}); break;
      case act==='lastminute': set({p1LastMinute:!state.p1LastMinute}); break;
      case act==='spotify': set({p1SpotifyConnected:!state.p1SpotifyConnected}); break;
      case act==='home': go(0); break;
      case act==='category': go(1); break;
      case act==='lobby': go(2); break;
      case act==='event': { const el=a.closest('[data-event]'); const ev=el?.getAttribute('data-event')||'coldplay'; state.eventKey=ev;
        if(ev==='match'){ state.evTitle=el.getAttribute('data-ev-title')||'משחק'; state.evVenue=el.getAttribute('data-ev-venue')||''; state.evDate=el.getAttribute('data-ev-date')||''; state.evPrice=el.getAttribute('data-ev-price')||''; state.evImg=el.getAttribute('data-ev-img')||''; }
        go(3); break; }
      case act==='occasion': go(4); break;
      case act==='football': go(5); break;
      case act==='nba': go(6); break;
      case act==='team': { state.teamKey = a.getAttribute('data-team')||'real'; go(7); break; }
      case act==='league': { state.phTitle = a.getAttribute('data-title')||'ליגה'; state.phNote='עמוד הליגה — בקרוב'; go(8); break; }
      case act==='allsport': { state.phTitle = a.getAttribute('data-title')||'כל האירועים'; state.phNote='כל האירועים — בקרוב'; go(8); break; }
      case act==='soon': { state.phTitle = a.getAttribute('data-title') || a.textContent.replace(/[›»‹]/g,'').trim() || 'בקרוב'; state.phNote='העמוד הזה עדיין בעיצוב — בקרוב'; go(8); break; }
      case act==='player': { state.phTitle = a.getAttribute('data-player')||'שחקן'; state.phNote='חדשות ועדכונים על השחקן — בקרוב'; go(8); break; }
      case act==='spotify-home': break;
      case act==='pl-play': playlistToggle(); break;
      case act==='pl-pop': set({plPopOpen:!state.plPopOpen}); break;
      case act==='cal-prev': { let mm=state.dpMonth-1, yy=state.dpYear; if(mm<0){mm=11;yy--;} set({dpMonth:mm,dpYear:yy}); break; }
      case act==='cal-next': { let mm=state.dpMonth+1, yy=state.dpYear; if(mm>11){mm=0;yy++;} set({dpMonth:mm,dpYear:yy}); break; }
      case act==='date-apply': {
        const label=dpLabel();
        if(state.openSheet==='date') set({p1DateLabel:label, openSheet:null});
        else set({p2DateSel:label, openSheet:null});
        break;
      }
      case act==='back-cat': go(1); break;
      case act==='back-lobby': go((EVENTS[state.eventKey]||EVENTS.coldplay).back); break;
      case act==='setlist3': set({setlistP3Open:!state.setlistP3Open}); break;
      case act==='p3filter': set({openSheet:'p3-filter'}); break;
      case act==='p3clear': set({selectedSection:null, p3Qty:null, p3Min:'', p3Max:'', p3f:{together:false,front:false,view:false,access:false}}); break;
      case act==='fav-feature': state.hearts.feature=!state.hearts.feature; render(); break;
      case act==='follow': { const on=!state.following; state.favCount=Math.max(0,state.favCount+(on?1:-1)); set({following:on}); break; }
      case act==='together': set({p2Together:!state.p2Together}); break;
      case act==='homeaway': set({homeAway:!state.homeAway}); break;
      case act==='setlist': set({setlistOpen:!state.setlistOpen}); break;
      case act==='lobby-setlist': set({setlistOpen:!state.setlistOpen}); break;
      case act==='pl-track': {
        const i=+a.getAttribute('data-i');
        if(state.playing && state.plCurrent===i){ stopPlaylistAudio(); set({playing:false}); }
        else { if(!state.playing) startPlaylistAudio(); set({playing:true, plCurrent:i}); }
        break;
      }
      case act==='bio': set({bioExpanded:!state.bioExpanded}); break;
      case act==='tour': set({tourExpanded:!state.tourExpanded}); break;
      case act==='share': case act==='watch': case act==='package': break;
      case act.startsWith('dsec:'): { const k=act.slice(5); set({drawerSection: state.drawerSection===k?null:k, drawerMusicGroup:null, mSport:null, mComp:null}); break; }
      case act.startsWith('dmg:'): { const k=act.slice(4); set({drawerMusicGroup: state.drawerMusicGroup===k?null:k}); break; }
      case act.startsWith('dsp:'): { const k=act.slice(4); set({mSport: state.mSport===k?null:k, mComp:null}); break; }
      case act.startsWith('dcp:'): { const k=act.slice(4); set({mComp: state.mComp===k?null:k}); break; }
      default: break;
    }
  };
}

function enableDrag(el){
  let down=false,x0=0,l0=0,moved=false;
  el.addEventListener('pointerdown',e=>{ if(e.pointerType==='touch')return; down=true;moved=false;x0=e.clientX;l0=el.scrollLeft;el.classList.add('dragging'); });
  window.addEventListener('pointermove',e=>{ if(!down)return; const dx=e.clientX-x0; if(Math.abs(dx)>3)moved=true; el.scrollLeft=l0-dx; });
  const end=()=>{ if(down){down=false;el.classList.remove('dragging');} };
  window.addEventListener('pointerup',end); window.addEventListener('pointercancel',end);
  el.addEventListener('click',e=>{ if(moved){e.preventDefault();e.stopPropagation();} },true);
  const rtl=getComputedStyle(el).direction==='rtl'?-1:1;
  el.addEventListener('wheel',e=>{ if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){el.scrollLeft+=rtl*e.deltaY;e.preventDefault();} },{passive:false});
}

// P3 collapsing hero: full → slim strip on scroll.
// Toggle the class directly (no full re-render) to keep scrolling smooth.
window.addEventListener('scroll', ()=>{
  // floating nav (Home + Lobby): transparent → solid dark-slate on scroll
  if(state.page===0 || state.page===2 || state.page===7){
    const solid = window.scrollY > 40;
    if(solid !== state.headerSolid){
      state.headerSolid = solid;
      const h = document.querySelector('.header--float');
      if(h) h.classList.toggle('solid', solid);
    }
  }
  // AI FAB appears on the homepage after scrolling
  if(state.page===0){ const fab=document.querySelector('.ai-fab.hide-home'); if(fab) fab.classList.toggle('show', window.scrollY>40); }
  if(state.page!==3) return;
  const c = window.scrollY > 220;
  if(c!==state.heroCollapsed){
    state.heroCollapsed = c;
    const slim = document.querySelector('.ev-slim');
    if(slim) slim.classList.toggle('show', c);
    // hand off from the transparent floating nav to the slim header
    const h = document.querySelector('.header--float');
    if(h) h.classList.toggle('nav-hidden', c);
  }
}, {passive:true});

// deep-link routing (#category / #lobby / #event / #search) so the prototype
// can be entered on any screen and the back button works
function applyHash(){
  const h=location.hash;
  if(h==='#category') state.page=1;
  else if(h==='#lobby') state.page=2;
  else if(h==='#event') state.page=3;
  else if(h==='#search'){ state.page=state.page||0; state.srOpen=true; state.srQuery=''; state.srPhase='idle'; }
  else state.page=0;
}
window.addEventListener('hashchange', ()=>{ applyHash(); render(); });
applyHash();
render();
