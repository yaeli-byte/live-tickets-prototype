  if(/מונדיאל|נבחרת|גביע העולם|world cup/.test(t)) return 'sport2.jpg';

  return 'sport1.jpg';
}

const FIXTURES = [
  {pair:['real','barca'], rivalry:'clasico', title:'ריאל מדריד נגד ברצלונה', date:'שבת · 14 יולי 2026',   comp:'לה ליגה', venue:'סנטיאגו ברנבאו, מדריד', price:'₪690', img:'team-realmadrid.jpg', ev:'clasico'},

];
function mNorm(s){ return (s||'').toString().toLowerCase().replace(/[.'"׳״]/g,'').replace(/\s+/g,' ').trim(); }
function mSamePair(a,b){ return a&&b&&a.length===2&&b.length===2 && ((a[0]===b[0]&&a[1]===b[1])||(a[0]===b[1]&&a[1]===b[0])); }
function mFindRivalry(pair){ return RIVALRIES.find(r=>mSamePair(r.pair,pair))||null; }
// Alias hit score: full substring match (strong) or last-word prefix while typing (weak).
function mAliasHit(text, alias){
  const t=mNorm(text), na=mNorm(alias); if(!na||!t) return 0;
  if(t.includes(na)) return na.length;
  const last=t.split(' ').pop();
  if(last.length>=3 && na.startsWith(last)) return last.length*0.4;
  return 0;
}
function mResolveTeam(text){
  let best=null,bestScore=0;
  for(const tm of TEAMS){ for(const a of tm.aliases){ const s=mAliasHit(text,a); if(s>bestScore){ best=tm; bestScore=s; } } }
  return best;
}
function mTeamGames(key){ return FIXTURES.filter(f=>f.pair.includes(key)); }
function mBuild(pair, rivalry){
  const teams=pair.map(k=>TEAMS.find(t=>t.key===k)).filter(Boolean);
  return {teams, pair, rivalry:rivalry||mFindRivalry(pair), fixtures:FIXTURES.filter(f=>mSamePair(f.pair,pair))};
}
// Returns {teams,pair,rivalry,fixtures} or null. Order-independent.
function resolveMatchup(query){
  const raw=(query||'').trim(); if(!raw) return null;
  const q=mNorm(raw);
  // 1) rivalry / nickname (longest match wins)
  let rHit=null,rLen=0;
  for(const r of RIVALRIES){ for(const n of r.nicknames){ const nn=mNorm(n); if(nn && q.includes(nn) && nn.length>rLen){ rHit=r; rLen=nn.length; } } }
  if(rHit) return mBuild(rHit.pair, rHit);
  // 2) head-to-head connector: TeamA (נגד|מול|vs|v|-) TeamB
  const parts=raw.split(/\s*(?:\bנגד\b|\bמול\b|\bvs\.?\b|\bv\b|\s-\s)\s*/i).filter(Boolean);
  if(parts.length>=2){ const a=mResolveTeam(parts[0]), b=mResolveTeam(parts[1]); if(a&&b&&a.key!==b.key) return mBuild([a.key,b.key]); }
  // 3) two known teams anywhere (order-independent, no connector; supports mid-typing)
  const found=[];
  for(const tm of TEAMS){ if(tm.aliases.some(al=>mAliasHit(raw,al)>0)){ if(!found.includes(tm.key)) found.push(tm.key); } }
  if(found.length>=2) return mBuild([found[0],found[1]]);
  return null;
}

  // Follow-ups grounded on the last resolved matchup.
  if(state.aiLastMatchup && state.aiLastMatchup.fixtures.length){
    const fx=state.aiLastMatchup.fixtures;
    if(/זול|cheap/i.test(q)){ const c=[...fx].sort((a,b)=>pNum(a.price)-pNum(b.price))[0]; return {summary:'הכי זול: '+c.title+' — מ-'+c.price+' (כולל כל העמלות), '+c.date+' · '+c.venue+'.', cards:[fxToAiCard(c)]}; }
    if(/מתי|הבא|התאריך|when|next/i.test(q)){ const c=fx[0]; return {summary:'המשחק הבא: '+c.title+' · '+c.date+' · '+c.venue+'. מ-'+c.price+' כולל עמלות.', cards:[fxToAiCard(c)]}; }
  }
  const sport=/כדורגל|ריאל|ברצלונ|קלאסיקו|nba|כדורסל|לייקרס|דרבי|משחק|ספורט|מונדיאל|אתלטיקו/i.test(q);
  const qt=(q||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));   // echo the query safely
  const ref=qt?`לגבי ״${qt}״ — `:'';
  return sport
    ? {summary:ref+'מצאתי משחקים זמינים בטווח שלך. ההצעות המשתלמות ביותר, כולל כל העמלות:', cards:AI_CARDS_SPORT}
    : {summary:ref+'מצאתי מופעים זמינים בטווח שלך. האפשרויות המשתלמות ביותר, כולל כל העמלות:', cards:AI_CARDS_CONCERT};
}
function openAI(query){
  if(state.page!==9) state.aiReturn = state.page;
  const q=(query||'').trim();
  state.aiConvo = q ? [{q, r:aiRespond(q)}] : [];
  state.srOpen=false; state.srFilterSheet=false; state.drawerOpen=false; state.acctOpen=false;

function aiSend(text){

/* ---------- מונדיאל knockout bracket ---------- */
const MONDIAL_BRACKET = {
  groups:[
    {a:{n:'ברזיל',f:'🇧🇷',s:'2'}, b:{n:'סרביה',f:'🇷🇸',s:'0'}, when:'הסתיים', done:true},
    {a:{n:'ארגנטינה',f:'🇦🇷',s:'3'}, b:{n:'מקסיקו',f:'🇲🇽',s:'1'}, when:'הסתיים', done:true},
    {a:{n:'אנגליה',f:'🇬🇧',s:'1'}, b:{n:'הולנד',f:'🇳🇱',s:'1'}, when:'הסתיים', done:true},
    {a:{n:'גרמניה',f:'🇩🇪',s:'2'}, b:{n:'יפן',f:'🇯🇵',s:'2'}, when:'הסתיים', done:true},
  ],
  r16:[
    {a:{n:'קנדה',f:'🇨🇦',s:'0'}, b:{n:'מרוקו',f:'🇲🇦',s:'3'}, when:'הסתיים', done:true},
    {a:{n:'פרגוואי',f:'🇵🇾'}, b:{n:'צרפת',f:'🇫🇷'}, when:'מחר · 00:00'},
    {a:{n:'ארה״ב',f:'🇺🇸'}, b:{n:'בלגיה',f:'🇧🇪'}, when:'ג׳ 7 יול · 3:00'},
    {a:{n:'פורטוגל',f:'🇵🇹'}, b:{n:'ספרד',f:'🇪🇸'}, when:'ב׳ 6 יול · 22:00'},
  ],
  qf:[
    {a:{n:'מרוקו',f:'🇲🇦'}, b:{n:'TBD',f:'🛡'}, when:'ה׳ 9 יול · 23:00'},
    {a:{n:'TBD',f:'🛡'}, b:{n:'TBD',f:'🛡'}, when:'ו׳ 10 יול · 22:00'},
  ],
  sf:[
    {a:{n:'TBD',f:'🛡'}, b:{n:'TBD',f:'🛡'}, when:'ג׳ 14 יול · 22:00'},
    {a:{n:'TBD',f:'🛡'}, b:{n:'TBD',f:'🛡'}, when:'ד׳ 15 יול · 22:00'},
  ],
  final:[
    {a:{n:'TBD',f:'🛡'}, b:{n:'TBD',f:'🛡'}, when:'א׳ 19 יול · 22:00 · MetLife'},
  ],
};
const MONDIAL_STAGES=[
  {key:'groups', label:'שלב הבתים'},
  {key:'r16',    label:'שמינית גמר'},
  {key:'qf',     label:'רבע גמר'},
  {key:'sf',     label:'חצי גמר'},
  {key:'final',  label:'גמר'},
];
function mondialBracket(){
  const tr=t=>`<div class="bt-row"><span class="bt-flag">${t.f}</span><span class="bt-name">${t.n}</span><span class="bt-score">${t.s!==undefined?t.s:''}</span></div>`;
  const card=m=>`<button class="bmatch" data-act="event" data-event="match" data-ev-title="${m.a.n} נגד ${m.b.n}" data-ev-venue="מונדיאל 2026 · ${m.when}" data-ev-price="₪760" data-ev-img="sport2.jpg">
    <div class="bm-when">${m.done?'<span class="bm-ft">הסתיים</span>':''}${m.when}</div>${tr(m.a)}${tr(m.b)}</button>`;
  const active='r16';
  return `
  <section class="section">
    <div class="sec-head"><span></span><h2 class="sec-title">טבלת המשחקים</h2></div>
    <div class="brk-tabs">${MONDIAL_STAGES.map(s=>`<button class="brk-tab ${s.key===active?'on':''}" data-act="brk-tab" data-stage="${s.key}">${s.label}</button>`).join('')}</div>
    <div class="bracket">
      ${MONDIAL_STAGES.map((s,i)=>`<div class="brk-col ${i>=2?'brk-col2':''}" data-stage="${s.key}"><div class="brk-lbl">${s.label}</div>${(MONDIAL_BRACKET[s.key]||[]).map(card).join('')}</div>`).join('')}
    </div>
  </section>`;
}

/* ---- shared calendar date-picker (used by every date filter) ---- */
const MONTHS_HE=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const MONTHS_SHORT=['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספט','אוק','נוב','דצמ'];
const DOW_HE=['א','ב','ג','ד','ה','ו','ש'];
function dpFmt(ts){ const d=new Date(ts); return d.getDate()+' '+MONTHS_SHORT[d.getMonth()]; }
function dpLabel(){
  if(!state.dpStart) return null;
  let l = state.dpEnd ? dpFmt(state.dpStart)+'–'+dpFmt(state.dpEnd) : dpFmt(state.dpStart);
  if(state.dpFlex!=='exact') l += ' ±'+state.dpFlex;
  return l;
}
function dateSheet(target){
  const y=state.dpYear, m=state.dpMonth;
  const first=new Date(y,m,1).getDay();
  const total=new Date(y,m+1,0).getDate();
  let cells='';
  for(let i=0;i<first;i++) cells+='<span class="cal-cell empty"></span>';
  for(let d=1;d<=total;d++){
    const ts=new Date(y,m,d).getTime();
    const sel = ts===state.dpStart || ts===state.dpEnd;
    const inRange = state.dpStart&&state.dpEnd&&ts>Math.min(state.dpStart,state.dpEnd)&&ts<Math.max(state.dpStart,state.dpEnd);
    cells+=`<button class="cal-cell${inRange?' inrange':''}" data-day="${d}"><span class="cal-num${sel?' sel':''}">${d}</span></button>`;
  }
  const flex=[['exact','תאריכים מדויקים'],['1','± יום'],['2','± יומיים'],['3','± 3 ימים']];
  return `
  <div class="sheet-backdrop open" data-act="close-sheet"></div>
  <div class="sheet open date-sheet">
    <div class="grab"></div>
    <div class="sh-head"><h3>מתי?</h3><button class="x" data-act="close-sheet">×</button></div>
    <div class="sh-body">
      <div class="cal-nav"><button data-act="cal-prev" aria-label="חודש קודם">›</button><span>${MONTHS_HE[m]} ${y}</span><button data-act="cal-next" aria-label="חודש הבא">‹</button></div>
      <div class="cal-dow">${DOW_HE.map(d=>`<span>${d}</span>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
      <div class="cal-flex">${flex.map(([k,l])=>`<button class="chip ${state.dpFlex===k?'active':''}" data-flex="${k}">${l}</button>`).join('')}</div>
    </div>
    <div class="sh-cta"><button class="btn btn-pink" style="width:100%" data-act="date-apply">${dpLabel()?'החל · '+dpLabel():'בחרו תאריך'}</button></div>
  </div>`;
}
function sheet(){
  const s = state.openSheet;
  if(!s) return `<div class="sheet-backdrop" data-act="close-sheet"></div><div class="sheet"></div>`;
  if(s==='p3-filter') return p3FilterSheet();
  if(s==='date' || s==='p2-date') return dateSheet(s==='date'?'p1':'p2');
  let title='', body='';
  if(s==='genre'){ title="ז'אנר";
    body = D.musicGenres.map(g=>`<button class="opt ${state.p1GenreSelected===g?'sel':''}" data-pick="genre:${g}">${g}<span>${state.p1GenreSelected===g?'✓':''}</span></button>`).join('');
  } else if(s==='city'){ title='עיר';
    body = D.cities.map(c=>`<button class="opt ${state.p1CitySelected===c?'sel':''}" data-pick="city:${c}">${c}<span>${state.p1CitySelected===c?'✓':''}</span></button>`).join('');
  } else if(s==='date'){ title='תאריך';
    const opts=['סוף השבוע','השבוע','החודש','חודש הבא','כל התאריכים'];
    body = opts.map(o=>`<button class="opt ${state.p1DateLabel===o?'sel':''}" data-pick="date:${o}">${o}<span>${state.p1DateLabel===o?'✓':''}</span></button>`).join('');
  } else if(s==='p2-date'){ title='תאריך';
    body = D.p2Dates.map(e=>{const lbl=`${e.d} ${e.dow} · ${e.city}`; return `<button class="opt ${state.p2DateSel===lbl?'sel':''}" data-pick="p2date:${lbl}">${lbl}<span>${state.p2DateSel===lbl?'✓':''}</span></button>`;}).join('');

/* ---- Search intent engine (ported from the prototype) ---- */
function srDetectIntent(q){
  if(!q) return 'idle';
  const ql=q.toLowerCase();
  const city=D.SR_CITIES.find(c=>c.name.includes(q)||ql.includes(c.name.toLowerCase()));
  const cat=D.srCats.find(c=>c.tags.some(t=>ql.includes(t)));
  const perf=D.SR_PERF.find(p=>p.tags.some(t=>ql.includes(t)));
  if(perf) return 'performer';
  if(city) return 'location';
  if(cat) return 'category';
  return 'performer';
}
function srTypeahead(q){
  if(!q.trim()) return [];
  const ql=q.toLowerCase(), intent=srDetectIntent(q), rows=[];
  // Matchup / rivalry / H2H resolves ABOVE literal suggestions.
  // When it resolves, we suppress the generic literal rows so every suggestion
  // leads to the matchup (not an unrelated stub that lands on Coldplay).
  const mu=resolveMatchup(q);
  if(mu){
    if(mu.fixtures.length){
      mu.fixtures.slice(0,2).forEach(f=>rows.push({kind:'matchup',label:f.title,sub:(mu.rivalry?mu.rivalry.name+' · ':'')+f.date+' · מ-'+f.price,thumb:f.img,fx:f}));
    } else {
      rows.push({kind:'matchup',label:(mu.rivalry?mu.rivalry.name:mu.teams.map(t=>t.name).join(' נגד ')),sub:'אין משחק מתוזמן · הצגת אפשרויות',thumb:(mu.teams[0]||{}).img,muQ:q});
    }
    rows.push({kind:'all',label:'כל התוצאות עבור "'+q+'"',sub:'',icon:'🔍'});
    return rows;
  }
  const topPerf=D.SR_PERF.find(p=>p.tags.some(t=>ql.includes(t)));
  const topCity=D.SR_CITIES.find(c=>c.name.includes(q)||ql.includes(c.name.toLowerCase()));
  const topCat=D.srCats.find(c=>c.tags.some(t=>ql.includes(t)));
  const topEvt=D.SR_EVENTS.find(e=>e.name.toLowerCase().includes(ql));
  const top=topPerf||topCity||topCat||topEvt;
  if(top) rows.push({kind:'top',label:top.name||'',sub:top.meta||top.date||'',icon:top.icon||'🔍',ev:top.ev,navP:top.lobby,navTeam:top.teamKey});
  if(intent==='performer'&&topPerf){
    D.SR_EVENTS.filter(e=>e.perfKey===topPerf.key).slice(0,3).forEach(e=>rows.push({kind:'event',label:e.name,sub:e.date+' · '+e.venue+' · '+e.price,icon:'🎫',ev:e.ev}));
    D.SR_PERF.filter(p=>p.type===topPerf.type&&p.key!==topPerf.key).slice(0,2).forEach(p=>rows.push({kind:'performer',label:p.name,sub:p.meta,icon:p.icon,navP:p.lobby,navTeam:p.teamKey}));
  } else if(intent==='location'&&topCity){
    D.SR_EVENTS.filter(e=>e.city===topCity.name).slice(0,3).forEach(e=>rows.push({kind:'event',label:e.name,sub:e.date+' · '+e.price,icon:'🎫',ev:e.ev}));
  } else if(intent==='category'&&topCat){
    D.srCats.filter(c=>c.key!==topCat.key).slice(0,2).forEach(c=>rows.push({kind:'category',label:c.name,sub:'',icon:c.icon}));
    D.SR_EVENTS.filter(e=>e.cat==='category'||(topCat.key==='football'&&e.cat==='team')).slice(0,3).forEach(e=>rows.push({kind:'event',label:e.name,sub:e.date+' · '+e.price,icon:'🎫',ev:e.ev}));
  }
  rows.push({kind:'all',label:'כל התוצאות עבור "'+q+'"',sub:'',icon:'🔍'});
  return rows.slice(0,8);
}
/* Contextual AI follow-up questions for the LIVE search dropdown (active state).
   No live model in the prototype → a small rule set: canned per demo topic, else
   query-filled templates with concert- vs sport-appropriate phrasing. */
const SR_AIQ = [
  {tags:['קולדפליי','coldplay'],                          qs:['כמה עולים כרטיסים לקולדפליי בוומבלי?','אילו תאריכים זמינים לקולדפליי באוגוסט?','מה ההבדל בין היציעים בוומבלי?']},
  {tags:['טיילור','סוויפט','taylor','swift'],              qs:['מתי ההופעה הקרובה של טיילור סוויפט?','מה טווח המחירים לכרטיסים לטיילור סוויפט?','יש כרטיסים צמודים לשניים להופעה?']},
  {tags:['bts','בי טי אס','בטס'],                          qs:['מתי המופע הקרוב של BTS?','כמה עולים כרטיסים ל-BTS?','אילו ערים זמינות בסיבוב של BTS?']},
  {tags:['ריאל','real madrid','לוס בלנקוס'],               qs:['מתי המשחק הקרוב של ריאל מדריד?','מה טווח המחירים למשחק בברנבאו?','יש כרטיסים לאל קלאסיקו הקרוב?']},
  {tags:['ברצלונ','ברסלונ','בארסה','ברסה','barca','barça'], qs:['מתי המשחק הקרוב של ברצלונה?','כמה עולים כרטיסים בקאמפ נואו?','יש כרטיסים לאל קלאסיקו הקרוב?']},
  {tags:['nba','אן בי איי','לייקרס','סלטיקס','כדורסל'],     qs:['אילו משחקי NBA זמינים החודש?','מה טווח המחירים לכרטיסי NBA?','מהם המקומות הכי טובים ליד הפרקט?']},
];
function srIsSport(q){ return /כדורגל|ריאל|ברצלונ|בארסה|ברסה|קלאסיקו|nba|כדורסל|לייקרס|סלטיקס|דרבי|משחק|ספורט|מונדיאל|אתלטיקו|ליגה|גביע/i.test(q||'') || !!resolveMatchup(q) || !!mResolveTeam(q); }
function srFollowups(q){
  const s=(q||'').trim(); if(!s) return [];
  const ql=s.toLowerCase();
  const hit=SR_AIQ.find(o=>o.tags.some(t=>ql.includes(t.toLowerCase())));
  if(hit) return hit.qs;
  const sport=srIsSport(s);
  return [
    sport?`מתי המשחק הקרוב של ${s}?`:`מתי ההופעה הקרובה של ${s}?`,
    `מה טווח המחירים לכרטיסים ל-${s}?`,
    `אילו תאריכים וערים זמינים ל-${s}?`,
    `מה החבילה הכי משתלמת ל-${s}?`,
  ];
}
function srFollowBlock(q){
  const fups=srFollowups(q); if(!fups.length) return '';
  return `<div class="sr-aifup">
    <div class="sr-aifup-h">המשיכו עם AI <span class="dot">✦</span></div>
    ${fups.map(f=>`<button class="sr-aiq" data-act="ai-open" data-q="${f.replace(/"/g,'&quot;')}"><span class="sp">✦</span><span class="tx">${f}</span><span class="ar">←</span></button>`).join('')}
  </div>`;
}
function srResults(q){
  if(!q.trim()) return {topMatch:null,events:[],performers:[],cities:[],categories:[]};
  const ql=q.toLowerCase(), intent=srDetectIntent(q);
  const topPerf=D.SR_PERF.find(p=>p.tags.some(t=>ql.includes(t)));
  const topCity=D.SR_CITIES.find(c=>c.name.includes(q)||ql.includes(c.name.toLowerCase()));
  const topCat=D.srCats.find(c=>c.tags.some(t=>ql.includes(t)));
  let events=[],performers=[],cities=[],categories=[];
  if(intent==='performer'&&topPerf){
    events=D.SR_EVENTS.filter(e=>e.perfKey===topPerf.key);
    performers=D.SR_PERF.filter(p=>p.type===topPerf.type&&p.key!==topPerf.key).slice(0,4);
    cities=D.SR_CITIES.slice(0,3);
  } else if(intent==='location'&&topCity){
    events=D.SR_EVENTS.filter(e=>e.city===topCity.name);
    performers=D.SR_PERF.slice(0,4);
    cities=D.SR_CITIES.filter(c=>c.key!==topCity.key).slice(0,3);
  } else if(intent==='category'&&topCat){
    events=D.SR_EVENTS.filter(e=>e.cat==='team'||e.cat==='category').slice(0,5);
    categories=D.srCats; performers=D.SR_PERF.filter(p=>p.type==='team').slice(0,4);
  } else {
    events=D.SR_EVENTS.filter(e=>e.name.toLowerCase().includes(ql)).slice(0,5);
    performers=D.SR_PERF.filter(p=>p.name.includes(q)).slice(0,4);
  }
  return {topMatch:topPerf||topCity||topCat,events,performers,cities,categories};
}

/* ============================================================
   FLOW 2 — PURCHASE  (Order → Checkout → Confirmation + Split + timer + edges)
   Guests-first · price shown "כולל עמלות" (fees included, itemized) · guest-first · fixed 375 frame
   Pages: 10 Order · 11 Checkout · 12 Confirmation · 13 Split setup ·
          14 Invite · 15 Friend pay · 16 Organizer · 17 Edge state
   ============================================================ */
function nis(n){ return '₪'+Number(n||0).toLocaleString('en-US'); }
function buyUnit(){ return state.buy ? state.buy.unit : 0; }        // per-ticket price · fees already included ("כולל עמלות")
function buyTicketsTotal(){ return buyUnit()*state.buyQty; }
function buyDeliveryFee(){ return 20; }                            // כרטיס דיגיטלי
function buyTogetherAmt(){ return state.buyAdjacent ? 90*state.buyQty : 0; }   // ישיבה יחד (paid add-on)
function buyCoverageAmt(){ return state.buyCoverage ? Math.round(buyTicketsTotal()*0.10) : 0; } // כיסוי ביטול
function buyTotal(){ return buyTicketsTotal() + buyDeliveryFee() + buyTogetherAmt() + buyCoverageAmt(); }
function splitPer(){ return Math.round(buyTotal()/Math.max(1,state.splitN)); }
/* unequal split — per-participant amounts must total the full price before seats can be secured */
function splitSum(){ let s=0; for(let i=0;i<state.splitN;i++) s+=(parseFloat(state.splitAmounts[i])||0); return s; }
function splitRemaining(){ return buyTotal()-splitSum(); }
function splitBalanced(){ return Math.abs(splitRemaining())<1; }
function splitInitAmounts(){ const n=state.splitN, per=Math.round(buyTotal()/n), a={}; for(let i=0;i<n;i++) a[i]=per; a[0]=per+(buyTotal()-per*n); state.splitAmounts=a; }
function updateSplitBal(){ const el=document.getElementById('splitBal'); if(!el) return; const rem=splitRemaining(), bal=splitBalanced();
  el.textContent = bal?'חולק במלואו ✓':(rem>0?`נותר לחלק ${nis(rem)}`:`חריגה של ${nis(-rem)} — עדכנו`); el.className='split-bal '+(bal?'ok':'warn');
  const cta=document.getElementById('splitCta'); if(cta){ if(bal){cta.classList.remove('disabled');cta.setAttribute('data-act','split-pay');} else {cta.classList.add('disabled');cta.removeAttribute('data-act');} } }
function fmtClock(s){ s=Math.max(0,s); const m=Math.floor(s/60), ss=s%60; return m+':'+String(ss).padStart(2,'0'); }
/* card number: auto-format (spaces), auto-detect brand, Luhn check */
function ccBrand(n){ if(/^4/.test(n))return 'VISA'; if(/^(5[1-5]|2[2-7])/.test(n))return 'MC'; if(/^3[47]/.test(n))return 'AMEX'; if(/^(6011|65|64[4-9])/.test(n))return 'DISCOVER'; return ''; }
function luhn(n){ let s=0,a=false; for(let i=n.length-1;i>=0;i--){let d=+n[i]; if(a){d*=2; if(d>9)d-=9;} s+=d; a=!a;} return n.length>=13 && s%10===0; }
function formatCC(el){
  const raw=el.value.replace(/\D/g,'').slice(0,16);
  el.value=raw.replace(/(.{4})/g,'$1 ').trim();
  const bEl=el.parentElement.querySelector('[data-ccbrand]');
  if(bEl){ bEl.textContent=ccBrand(raw); bEl.className='cc-brand'+(raw.length>=13?(luhn(raw)?' ok':' bad'):''); }
}
function formatExp(el){ const raw=el.value.replace(/\D/g,'').slice(0,4); el.value=raw.length>2?raw.slice(0,2)+'/'+raw.slice(2):raw; }
/* lightweight toast for one-off confirmations (copy, remind, notify…) */
function toast(msg){
  const old=document.querySelector('.toast'); if(old) old.remove();
  const el=document.createElement('div'); el.className='toast'; el.textContent=msg; document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(),300); },1700);
}

/* ---- hold timer (persists across pages; updates in place; graceful expiry) ---- */
let holdTimer=null;
function startHold(step){
  state.holdActive=true; state.holdExpired=false; state.holdWarn=false; state.aobDismissed=false;
  state.holdSec=600; state.holdStep=step||10;
  clearInterval(holdTimer); holdTimer=setInterval(tickHold,1000);
}
function tickHold(){
  if(!state.holdActive) return;
  state.holdSec--;
  document.querySelectorAll('.aob-clk,.obar2 .clk,.ot-clk').forEach(el=>el.textContent=fmtClock(state.holdSec));
  const warn=state.holdSec<=120 && state.holdSec>0, exp=state.holdSec<=0;
  if(warn!==state.holdWarn || exp!==state.holdExpired){
    state.holdWarn=warn; state.holdExpired=exp;
    if(exp) clearInterval(holdTimer);
    render();
  }
}
function stopHold(){ state.holdActive=false; state.holdWarn=false; state.holdExpired=false; clearInterval(holdTimer); }

function fmt24(s){ s=Math.max(0,s|0); const p=n=>String(n).padStart(2,'0'); return `${p(Math.floor(s/3600))}:${p(Math.floor((s%3600)/60))}:${p(s%60)}`; }
function startHold24(){ state.h24Active=true; state.h24Sec=86400; state.aobDismissed=false; clearInterval(hold24Timer); hold24Timer=setInterval(tickHold24,1000); }
function tickHold24(){ if(!state.h24Active) return; state.h24Sec=Math.max(0,state.h24Sec-1); document.querySelectorAll('.h24-clk').forEach(el=>el.textContent=fmt24(state.h24Sec)); if(state.h24Sec<=0) clearInterval(hold24Timer); }
function stopHold24(){ state.h24Active=false; clearInterval(hold24Timer); }

/* realistic stadium bowl — color-coded ring sections + seat-dot texture + section numbers */
/* shared bowl geometry so the overview map and the zoomed seat map share exact shapes */
const BOWL={cx:450, cy:300, RX:398, RY:274,
  rings:[{s0:.50,s1:.65,n0:100,segs:20},{s0:.67,s1:.82,n0:200,segs:22},{s0:.84,s1:.99,n0:300,segs:24}]};

const SECTION_GEO={ north:[0,0], vip:[0,2], east:[0,5], south:[0,10], west:[0,15], 'south-c':[1,11] };
const BOWL_AC={infield:'#cdeed7',club:'#d7d4f1',view:'#d3e4f8',premium:'#f4e9cf',baseline:'#e7d7f3',bleach:'#f8dce9',home:'#bfead9'};

function areaColorFor(key){
  const geo=SECTION_GEO[key]; if(!geo) return BOWL_AC.view;
  const ring=BOWL.rings[geo[0]]; if(!ring) return BOWL_AC.view;
  const step=(2*Math.PI)/ring.segs, a1=-Math.PI/2+geo[1]*step, a2=a1+step*0.9, mid=(a1+a2)/2;
  const deg=((mid*180/Math.PI)%360+360)%360;
  let area;
  if(deg>250&&deg<290) area=ring.n0===100?'home':(ring.n0===200?'premium':'view');
  else if(deg>75&&deg<105) area=ring.n0===300?'bleach':(ring.n0===100?'infield':'club');

}
function stadiumBowl(){
  const P=(a,s)=>{const q=bowlPt(a,s); return [q[0].toFixed(1),q[1].toFixed(1)];};
  const rings=BOWL.rings;
  const AC=BOWL_AC;
  const areaOf=(ring,deg)=>{
    if(deg>250&&deg<290) return ring.n0===100?'home':(ring.n0===200?'premium':'view');
    if(deg>75&&deg<105)  return ring.n0===300?'bleach':(ring.n0===100?'infield':'club');
    if(ring.n0===100 && ((deg<=75)||(deg>=105&&deg<=250)||(deg>=290))) return 'baseline';
    return ring.n0===100?'infield':(ring.n0===200?'club':'view');
  };
  let out='';
  rings.forEach(ring=>{
    const step=(2*Math.PI)/ring.segs;
    for(let i=0;i<ring.segs;i++){
      const a1=-Math.PI/2+i*step, a2=a1+step*0.9;
      const p1=P(a1,ring.s0),p2=P(a2,ring.s0),p3=P(a2,ring.s1),p4=P(a1,ring.s1);
      const mid=(a1+a2)/2, deg=((mid*180/Math.PI)%360+360)%360;
      const pts=`${p1[0]},${p1[1]} ${p2[0]},${p2[1]} ${p3[0]},${p3[1]} ${p4[0]},${p4[1]}`;
      const c=P(mid,(ring.s0+ring.s1)/2);

/* zoom toward the map centre by a factor */
/* the interactive stadium svg currently on screen (desktop overview or mobile event page) */
function activeStadium(){ return document.getElementById('dStadium') || document.getElementById('ssStadium'); }
function mapZoomBy(factor){
  const svg=activeStadium(); if(!svg) return;
  let [x,y,w,h]=(svg.getAttribute('viewBox')||'0 0 900 620').split(' ').map(Number);
  const cx=x+w/2, cy=y+h/2;
  let nw=Math.min(1000,Math.max(240,w*factor)), nh=nw*(620/900);
  svg.setAttribute('viewBox',[cx-nw/2, cy-nh/2, nw, nh].join(' '));
}
/* drag-to-pan + wheel-zoom (mouse) + one-finger pan / pinch-zoom (touch) — bound once per svg */
function bindMap(){
  const svg=activeStadium(); if(!svg||svg.__bound) return; svg.__bound=true;
  const vb=()=>(svg.getAttribute('viewBox')||'0 0 900 620').split(' ').map(Number);
  const setVB=(x,y,w,h)=>svg.setAttribute('viewBox',[x,y,w,h].join(' '));
  const zoomAt=(w,h,x,y,f)=>{ let nw=Math.min(1000,Math.max(240,w*f)), nh=nw*(620/900); return [x+w/2-nw/2, y+h/2-nh/2, nw, nh]; };
  svg.addEventListener('wheel',e=>{ e.preventDefault(); mapZoomBy(e.deltaY>0?1.12:0.9); },{passive:false});
  let drag=null;
  svg.addEventListener('mousedown',e=>{ if(e.target.closest('.mz'))return; drag={sx:e.clientX,sy:e.clientY,v:vb(),moved:false}; svg.style.cursor='grabbing'; });
  window.addEventListener('mousemove',e=>{ if(!drag)return; const [x,y,w,h]=drag.v; const r=svg.getBoundingClientRect(); if(Math.abs(e.clientX-drag.sx)+Math.abs(e.clientY-drag.sy)>3)drag.moved=true; setVB(x-(e.clientX-drag.sx)*(w/r.width), y-(e.clientY-drag.sy)*(h/r.height), w, h); });
  window.addEventListener('mouseup',()=>{ if(drag){ if(drag.moved) svg.__suppressClick=Date.now(); drag=null; svg.style.cursor=''; } });
  svg.addEventListener('click',e=>{ if(svg.__suppressClick && Date.now()-svg.__suppressClick<250){ e.stopPropagation(); e.preventDefault(); svg.__suppressClick=0; } }, true);
  // touch: one-finger pan, two-finger pinch-zoom
  let tdrag=null, pinch=null;
  svg.addEventListener('touchstart',e=>{
    if(e.touches.length===2){ tdrag=null; const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY; pinch={d0:Math.hypot(dx,dy),v:vb()}; }
    else if(e.touches.length===1){ if(e.target.closest('.mz'))return; tdrag={sx:e.touches[0].clientX,sy:e.touches[0].clientY,v:vb(),moved:false}; }
  },{passive:true});
  svg.addEventListener('touchmove',e=>{
    if(pinch && e.touches.length===2){ e.preventDefault(); const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY; const [x,y,w,h]=pinch.v; setVB.apply(null, zoomAt(w,h,x,y, pinch.d0/Math.max(1,Math.hypot(dx,dy)))); }
    else if(tdrag && e.touches.length===1){ const [x,y,w,h]=tdrag.v; const r=svg.getBoundingClientRect(); const mx=e.touches[0].clientX-tdrag.sx, my=e.touches[0].clientY-tdrag.sy; if(Math.abs(mx)+Math.abs(my)>4){ tdrag.moved=true; e.preventDefault(); } setVB(x-mx*(w/r.width), y-my*(h/r.height), w, h); }
  },{passive:false});
  svg.addEventListener('touchend',e=>{ if(e.touches.length===0){ if(tdrag&&tdrag.moved) svg.__suppressClick=Date.now(); tdrag=null; pinch=null; } },{passive:true});
}

/* smooth viewBox zoom into a section (event map) before opening the seat page.
   Navigation is driven by a setTimeout (not rAF) so it fires even if the
   animation frames are throttled; the rAF tween is a visual nice-to-have. */
function deskZoom(key,then){
  const svg=document.getElementById('dStadium'); if(!svg){ then(); return; }
  const pin=svg.querySelector('.mpin[data-lkey="'+key+'"]'); let tx=450, ty=305;
  if(pin){ const m=/translate\(([-\d.]+),\s*([-\d.]+)\)/.exec(pin.getAttribute('transform')||''); if(m){ tx=+m[1]; ty=+m[2]; } }
  const from=(svg.getAttribute('viewBox')||'0 0 900 620').split(' ').map(Number);
  const nw=from[2]*0.42, nh=from[3]*0.42, to=[tx-nw/2, ty-nh/2, nw, nh];
  const dur=460, t0=performance.now();
  function step(now){ const k=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-k,3);
    svg.setAttribute('viewBox', from.map((f,i)=>f+(to[i]-f)*e).join(' ')); if(k<1) requestAnimationFrame(step); }
  requestAnimationFrame(step);
  setTimeout(then, dur+120);
}

/* ---- Spotify playlist: real in-page audio (Web Audio API) ---- */
let audioCtx=null, audioTimer=null;
const PL_NOTES=[523.25,659.25,783.99,659.25,587.33,698.46,880.0,698.46];
function playlistToggle(){
  state.playing=!state.playing;
  if(state.playing) startPlaylistAudio(); else stopPlaylistAudio();
  render();
}
function startPlaylistAudio(){
  try{ audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
  catch(_){ return; }
  state.playIdx=0;
  const step=()=>{
    if(!audioCtx) return;
    const t=audioCtx.currentTime;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='triangle'; o.frequency.value=PL_NOTES[state.playIdx%PL_NOTES.length];
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.16,t+0.03); g.gain.exponentialRampToValueAtTime(0.0008,t+0.42);
    o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t+0.45);
    state.playIdx++;
  };
  step(); audioTimer=setInterval(step, 420);
}
function stopPlaylistAudio(){ if(audioTimer){clearInterval(audioTimer);audioTimer=null;} }

      case act==='copy-link': { try{navigator.clipboard&&navigator.clipboard.writeText('https://livetickets.co.il/split/xR4k');}catch(_){}; state.linkCopied=true; toast('הלינק הועתק ✓'); render(); break; }
      case act==='to-organizer': go(16); break;
      case act==='preview-friend': go(15); break;
      case act==='friend-paid': toast('התשלום שלך התקבל · תודה!'); go(16); break;
      case act==='mark-allpaid': state.splitAllPaid=true; state.splitConfirmed=true; stopHold(); stopHold24(); go(12); break;  // paid in full → timer stops, straight to success
      case act==='split-confirm': stopHold(); go(12); break;
      case act==='confirm-pay': stopHold(); go(12); break;
      case act==='pay': { const cash=state.payMethod==='cash'; stopHold(); set({cashPending:cash, aobDismissed:false}); if(cash) startHold24(); go(12); break; }   // offline → 24h pending window; else confirmed
      case act==='to-confirm': go(12); break;
      case act==='cash-expire': { state.cashPending=false; stopHold24(); state.buyEdge='expired'; go(17); break; }   // 24h passed, payment not received → auto-cancel, start over
      case act==='install': set({coInstall:a.getAttribute('data-n')}); break;
      case act==='mytickets': { state.phTitle='הכרטיסים שלי'; state.phNote='האזור האישי — הכרטיסים שלכם יופיעו כאן · בקרוב'; go(8); break; }
      case act==='wallet': toast('נוסף לארנק ✓'); break;
      case act==='remind': toast('תזכורת נשלחה ✓'); break;
      case act==='notify': toast('נרשמתם להתראה — נעדכן כשמתפנה במחיר שלכם'); break;
      case act==='hold-back': go(state.holdStep||10); break;
      case act==='aob-close': set({aobDismissed:true}); break;   // dismiss the floating active-order snackbar
      case act==='edge-expired': state.buyEdge='expired'; go(17); break;
      case act==='edge-soldout': set({buyEdge:'soldout'}); break;
      case act==='rehold': startHold(10); state.buyEdge=null; go(10); break;
      case act==='alt-pick': { const p=parseInt(a.getAttribute('data-price'))||state.buy.unit; if(state.buy){ state.buy.unit=p; state.buy.sec=a.getAttribute('data-sec')||state.buy.sec; } state.buyEdge=null; state.buyQty=1; startHold(10); go(10); break; }
      case act==='brk-tab': {  // scroll the bracket to the chosen stage (no re-render)
        const stage=a.getAttribute('data-stage');
        const bracket=document.querySelector('.bracket');
        const col=bracket&&bracket.querySelector('.brk-col[data-stage="'+stage+'"]');
        if(col){
          const bR=bracket.getBoundingClientRect(), cR=col.getBoundingClientRect();
          bracket.scrollBy({left:(cR.left+cR.width/2)-(bR.left+bR.width/2), behavior:'smooth'});
        }
        document.querySelectorAll('.brk-tab').forEach(t=>t.classList.toggle('on', t.getAttribute('data-stage')===stage));
        return;
      }
      case act==='close-drawer': set({drawerOpen:false, acctOpen:false, drawerSection:null, drawerMusicGroup:null, mSport:null, mComp:null}); break;
      case act==='close-sheet': set({openSheet:null}); break;
      case act==='lastminute': set({p1LastMinute:!state.p1LastMinute}); break;
      case act==='spotify': set({p1SpotifyConnected:!state.p1SpotifyConnected}); break;
      case act==='home': go(0); break;
      case act==='category': go(1); break;
      case act==='lobby': go(2); break;
      case act==='event': { const el=a.closest('[data-event]'); const ev=el?.getAttribute('data-event')||'coldplay'; state.eventKey=ev;
        if(ev==='match'){ state.evTitle=el.getAttribute('data-ev-title')||'משחק'; state.evVenue=el.getAttribute('data-ev-venue')||''; state.evDate=el.getAttribute('data-ev-date')||''; state.evPrice=el.getAttribute('data-ev-price')||''; state.evImg=el.getAttribute('data-ev-img')||''; }
        state.qtyChosen=false; state.qtyModal=true;   // "כמה כרטיסים?" popup between the lobby and the event page
        go(3); break; }
      case act==='qty-pick': set({buyQty:parseInt(a.getAttribute('data-q'))||1, qtyModal:false, qtyChosen:true}); break;
      case act==='qty-set': set({buyQty:parseInt(a.getAttribute('data-q'))||1}); break;   // popup: pick qty, keep open so the sit-together note updates live
      case act==='qty-confirm': set({qtyModal:false, qtyChosen:true}); break;              // popup: apply chosen qty
      case act==='qty-modal-close': set({qtyModal:false, qtyChosen:true}); break;
      case act==='occasion': go(4); break;
      case act==='football': state.leagueTitle=''; go(5); break;
      case act==='leaguelobby': state.leagueTitle=a.getAttribute('data-title')||''; go(5); break;
      case act==='nba': go(6); break;
      case act==='team': { state.teamKey = a.getAttribute('data-team')||'real'; go(7); break; }
      case act==='league': { state.phTitle = a.getAttribute('data-title')||'ליגה'; state.phNote='עמוד הליגה — בקרוב'; go(8); break; }
      case act==='allsport': { state.phTitle = a.getAttribute('data-title')||'כל האירועים'; state.phNote='כל האירועים — בקרוב'; go(8); break; }
      case act==='soon': { state.phTitle = a.getAttribute('data-title') || a.textContent.replace(/[›»‹]/g,'').trim() || 'בקרוב'; state.phNote='העמוד הזה עדיין בעיצוב — בקרוב'; go(8); break; }
      case act==='player': { state.phTitle = a.getAttribute('data-player')||'שחקן'; state.phNote='חדשות ועדכונים על השחקן — בקרוב'; go(8); break; }
      case act==='spotify-home': break;
      case act==='pl-play': playlistToggle(); break;
      case act==='pl-pop': set({plPopOpen:!state.plPopOpen}); break;
      case act==='cal-prev': { let mm=state.dpMonth-1, yy=state.dpYear; if(mm<0){mm=11;yy--;} set({dpMonth:mm,dpYear:yy}); break; }
      case act==='cal-next': { let mm=state.dpMonth+1, yy=state.dpYear; if(mm>11){mm=0;yy++;} set({dpMonth:mm,dpYear:yy}); break; }
      case act==='date-apply': {
        const label=dpLabel();
        if(state.openSheet==='date') set({p1DateLabel:label, openSheet:null});
        else set({p2DateSel:label, openSheet:null});
        break;
      }
      case act==='back-cat': go(1); break;
      case act==='back-lobby': go((EVENTS[state.eventKey]||EVENTS.coldplay).back); break;
      case act==='setlist3': set({setlistP3Open:!state.setlistP3Open}); break;
      case act==='p3filter': set({openSheet:'p3-filter'}); break;
      case act==='p3clear': set({selectedSection:null, p3Qty:null, p3Min:'', p3Max:'', p3f:{together:false,front:false,view:false,access:false}}); break;
      case act==='fav-feature': state.hearts.feature=!state.hearts.feature; render(); break;
      case act==='follow': { const on=!state.following; state.favCount=Math.max(0,state.favCount+(on?1:-1)); set({following:on}); break; }
      case act==='together': set({p2Together:!state.p2Together}); break;
      case act==='homeaway': set({homeAway:!state.homeAway}); break;
      case act==='setlist': set({setlistOpen:!state.setlistOpen}); break;
      case act==='lobby-setlist': set({setlistOpen:!state.setlistOpen}); break;
      case act==='pl-track': {
        const i=+a.getAttribute('data-i');
        if(state.playing && state.plCurrent===i){ stopPlaylistAudio(); set({playing:false}); }
        else { if(!state.playing) startPlaylistAudio(); set({playing:true, plCurrent:i}); }
        break;
      }
      case act==='bio': set({bioExpanded:!state.bioExpanded}); break;
      case act==='tour': set({tourExpanded:!state.tourExpanded}); break;
      case act==='share': set({sharePop:true}); break;
      case act==='share-close': set({sharePop:false}); break;
      case act==='share-do': {
        const to=a.getAttribute('data-to');
        if(to==='copy'){ try{navigator.clipboard&&navigator.clipboard.writeText('https://livetickets.co.il');}catch(_){} }
        set({sharePop:false});
        toast({stories:'מוכן לשיתוף בסטורי ✓',save:'התמונה נשמרה ✓',copy:'הקישור הועתק ✓',wa:'נפתח וואטסאפ לשיתוף'}[to]||'שותף ✓');
        break;
      }
      case act==='wa-split': toast('נפתח וואטסאפ עם קישור התשלום'); break;
      case act==='watch': case act==='package': break;
      case act.startsWith('dsec:'): { const k=act.slice(5); set({drawerSection: state.drawerSection===k?null:k, drawerMusicGroup:null, mSport:null, mComp:null, mFbLeague:null}); break; }
      case act.startsWith('dfb:'): { const k=act.slice(4); set({mFbLeague: state.mFbLeague===k?null:k}); break; }
      case act.startsWith('dmg:'): { const k=act.slice(4); set({drawerMusicGroup: state.drawerMusicGroup===k?null:k}); break; }
      case act.startsWith('dsp:'): { const k=act.slice(4); set({mSport: state.mSport===k?null:k, mComp:null}); break; }
      case act.startsWith('dcp:'): { const k=act.slice(4); set({mComp: state.mComp===k?null:k}); break; }
      default: break;
    }
  };
}

function enableDrag(el){
  let down=false,x0=0,l0=0,moved=false;
  el.addEventListener('pointerdown',e=>{ if(e.pointerType==='touch')return; down=true;moved=false;x0=e.clientX;l0=el.scrollLeft;el.classList.add('dragging'); });
  window.addEventListener('pointermove',e=>{ if(!down)return; const dx=e.clientX-x0; if(Math.abs(dx)>3)moved=true; el.scrollLeft=l0-dx; });
  const end=()=>{ if(down){down=false;el.classList.remove('dragging');} };
  window.addEventListener('pointerup',end); window.addEventListener('pointercancel',end);
  el.addEventListener('click',e=>{ if(moved){e.preventDefault();e.stopPropagation();} },true);
  const rtl=getComputedStyle(el).direction==='rtl'?-1:1;
  el.addEventListener('wheel',e=>{ if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){el.scrollLeft+=rtl*e.deltaY;e.preventDefault();} },{passive:false});
}

// P3 collapsing hero: full → slim strip on scroll.
// Toggle the class directly (no full re-render) to keep scrolling smooth.
window.addEventListener('scroll', ()=>{
  // floating nav (Home + Lobby): transparent → solid dark-slate on scroll
  if(state.page===0 || state.page===2 || state.page===7){
    const solid = window.scrollY > 40;
    if(solid !== state.headerSolid){
      state.headerSolid = solid;
      const h = document.querySelector('.header--float');
      if(h) h.classList.toggle('solid', solid);
    }
  }
  // AI FAB appears on the homepage after scrolling
  if(state.page===0){ const fab=document.querySelector('.ai-fab.hide-home'); if(fab) fab.classList.toggle('show', window.scrollY>40); }
  // seat + checkout: the trust/price-lock banner scrolls away; a compact timer appears in the sticky hero
  if(state.page===10 || state.page===11){
    const stk = document.querySelector(state.page===10 ? '.seat-stk' : '.chk-stick');
    if(stk) stk.classList.toggle('scrolled', window.scrollY > 130);
    return;
  }
  if(state.page!==3) return;
  const c = window.scrollY > 220;
  if(c!==state.heroCollapsed){
    state.heroCollapsed = c;
    const slim = document.querySelector('.ev-slim');
    if(slim) slim.classList.toggle('show', c);
    // hand off from the transparent floating nav to the slim header
    const h = document.querySelector('.header--float');
    if(h) h.classList.toggle('nav-hidden', c);
  }
}, {passive:true});

// deep-link routing (#category / #lobby / #event / #search) so the prototype
// can be entered on any screen and the back button works
function applyHash(){
  // ?tpl=<key> — deep-links used by the style guide's "Page Templates" catalog
  const tpl=new URLSearchParams(location.search).get('tpl');
  if(tpl){
    const T={
      'home':0, 'category-genre':1, 'lobby-artist':2, 'category-tournament':4,
      'category-sport':5, 'category-nba':6, 'lobby-team':7, 'ai':9
    };
    if(tpl==='event-concert'){ state.eventKey='coldplay'; state.page=3; return; }
    if(tpl==='event-match'){ state.eventKey='clasico'; state.page=3; return; }
    if(tpl==='lobby-team'){ state.teamKey='real'; }
    if(tpl in T){ state.page=T[tpl]; return; }
  }
  const h=location.hash;
  if(h==='#category') state.page=1;
  else if(h==='#lobby') state.page=2;
  else if(h==='#event') state.page=3;
  else if(h==='#search'){ state.page=state.page||0; state.srOpen=true; state.srQuery=''; state.srPhase='idle'; }
  else state.page=0;
}
window.addEventListener('hashchange', ()=>{ applyHash(); render(); });
/* desktop detection — purchase-flow screens become wide two-pane at ≥1000px */
const MQ_DESK = window.matchMedia('(min-width:1000px)');
state.desktop = MQ_DESK.matches;
MQ_DESK.addEventListener('change', e=>{ state.desktop = e.matches; render(); });
applyHash();
render();
</script>
